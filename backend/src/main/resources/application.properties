# ==================== APPLICATION ====================
spring.application.name=educore
server.port=${PORT:8081}

# ==================== AI SERVICE ====================
# الـ Python/FastAPI AI service URL
# Dev: localhost:8000 | Production: غيّر عبر AI_SERVICE_URL env variable
#ai.service.url=${AI_SERVICE_URL:http://localhost:8000}
# timeout بالثواني لطلبات الـ AI (اللي بتاخد وقت بسبب الـ LLM)
ai.service.timeout-seconds=${AI_SERVICE_TIMEOUT:60}
ai.service.url=http://98.94.45.209:8000
# ==================== DATABASE ====================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/educore}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1162004}
spring.datasource.driver-class-name=org.postgresql.Driver
# Connection pool (HikariCP)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ==================== JPA / HIBERNATE ====================
# update: تعمل migrate للـ schema تلقائياً — مناسبة للـ development فقط
# validate: بتتحقق من الـ schema بس بدون تغيير — الأفضل للـ production
# ⚠️ ملاحظة: تأكد إن الـ schema في الـ DB متوافق مع الـ Entities قبل التشغيل.
#    لو في columns أو tables جديدة → شغّل الـ migration SQL يدوياً أولاً.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# dialect محذوف — Hibernate بيكتشفه تلقائياً من الـ datasource (يوقف الـ deprecation warning)

# ==================== REDIS — DISABLED ====================
# السيشنز بتتحفظ في PostgreSQL عبر DatabaseSessionService.
# Redis مش مطلوب ومش مستخدم — بنستثنيه صراحةً عشان Spring Boot
# ما يحاولش يتصل بسيرفر Redis غير موجود عند الـ startup.
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.session.SessionAutoConfiguration
spring.session.store-type=none
spring.data.redis.repositories.enabled=false

# ==================== JWT ====================
# غيّر الـ secret في الـ production عبر env variable JWT_SECRET
jwt.secret=${JWT_SECRET:educore-dev-secret-key-minimum-256-bits-change-in-production-xyz}
jwt.expiration=1800
jwt.refresh-expiration=2592000

# ==================== SESSION ====================
app.session.timeout=30
app.max.sessions.per.user=3
app.auto-logout.enabled=true

# Secure cookie = false في الـ dev (HTTP localhost)
# في الـ production (HTTPS): غيّرها لـ true عبر env
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${COOKIE_SECURE:false}

