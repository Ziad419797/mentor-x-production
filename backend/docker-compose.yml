version: '3.9'

# ═══════════════════════════════════════════════════════════════════
#  EduCore — Local Development Setup
#
#  شغّل الأمر ده لتشغيل PostgreSQL محلياً:
#    docker-compose up -d
#
#  وقف:
#    docker-compose down
#
#  وقف وامسح البيانات:
#    docker-compose down -v
# ═══════════════════════════════════════════════════════════════════

services:

  # ─── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: educore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: educore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1162004
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d educore"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
