<!-- ══ TOP APP BAR ══ -->
<header class="fixed top-0 left-0 right-0 h-16 z-40 bg-white dark:bg-[#162033] border-b border-[#DDE1EA] dark:border-slate-800 flex items-center justify-between flex-row-reverse px-4 md:px-8">

  <!-- Left (visually): logo → home -->
  <a routerLink="/home" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
    <!-- Dark mode: use darkLogoUrl if available -->
    <ng-container *ngIf="darkMode() && darkLogoUrl()">
      <img [src]="darkLogoUrl()" alt="logo" class="max-w-[220px] object-contain">
    </ng-container>
    <!-- Light mode OR no dark logo: use teacherLogoUrl -->
    <ng-container *ngIf="!(darkMode() && darkLogoUrl()) && teacherLogoUrl()">
      <img [src]="teacherLogoUrl()" alt="logo" class="max-w-[220px] object-contain">
    </ng-container>
    <!-- No logo at all: EduCore fallback -->
    <ng-container *ngIf="!teacherLogoUrl() && !darkLogoUrl()">
      <div class="w-8 h-8 rounded-xl bg-[#183764] flex items-center justify-center">
        <span class="material-symbols-outlined text-white"
              style="font-size:18px;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">school</span>
      </div>
      <span class="font-bold text-[#183764] dark:text-white text-sm hidden sm:block">EduCore</span>
    </ng-container>
  </a>

  <!-- Right: avatar + notifications + wallet + dark mode -->
  <div class="flex items-center gap-2 flex-row-reverse">

    <!-- Notifications -->
    <div class="relative" (click)="$event.stopPropagation()">
      <button (click)="toggleNotif($event)"
              class="w-10 h-10 rounded-xl hover:bg-[#F5F6FA] dark:hover:bg-white/5 flex items-center justify-center transition-all relative">
        <span class="material-symbols-outlined text-[#8892a0] dark:text-white/60" style="font-size:20px">notifications</span>
        <span *ngIf="hasUnread"
              class="absolute top-2 right-2 w-2 h-2 bg-[#F59239] rounded-full border-2 border-white dark:border-[#162033]"></span>
      </button>
      <!-- Dropdown -->
      <div *ngIf="notifOpen()"
           class="absolute right-0 mt-2 w-80 bg-white dark:bg-[#162033] rounded-2xl shadow-2xl border border-[#DDE1EA] dark:border-slate-800 z-50 overflow-hidden">
        <div class="px-4 py-3 border-b border-[#DDE1EA] dark:border-slate-800 flex justify-between items-center">
          <span class="font-bold text-sm text-[#183764] dark:text-white">الإعلانات</span>
        </div>
        <div class="max-h-72 overflow-y-auto">
          <div *ngFor="let a of announcements()"
               class="flex items-start gap-3 p-4 hover:bg-[#F5F6FA] dark:hover:bg-white/5 transition-colors border-b border-[#DDE1EA]/40 cursor-pointer">
            <div class="w-2 h-2 rounded-full bg-[#F59239] mt-1.5 flex-shrink-0"></div>
            <div>
              <p class="text-sm font-semibold text-[#183764] dark:text-white">{{ a.title }}</p>
              <p class="text-xs text-[#8892a0] mt-0.5">{{ a.content || a.message }}</p>
            </div>
          </div>
          <div *ngIf="announcements().length === 0"
               class="p-6 text-center text-sm text-[#8892a0]">لا توجد إعلانات</div>
        </div>
      </div>
    </div>

    <!-- Wallet -->
    <button routerLink="/wallet"
            class="w-10 h-10 rounded-xl hover:bg-[#F5F6FA] dark:hover:bg-white/5 flex items-center justify-center transition-all"
            title="المحفظة">
      <span class="material-symbols-outlined text-[#8892a0] dark:text-white/60" style="font-size:20px">account_balance_wallet</span>
    </button>

    <!-- Dark mode toggle -->
    <button (click)="toggleDark()"
            class="w-10 h-10 rounded-xl hover:bg-[#F5F6FA] dark:hover:bg-white/5 flex items-center justify-center transition-all">
      <span *ngIf="!darkMode()" class="material-symbols-outlined text-[#8892a0]" style="font-size:20px">dark_mode</span>
      <span *ngIf="darkMode()" class="material-symbols-outlined text-white/60" style="font-size:20px">light_mode</span>
    </button>

        <!-- Avatar + dropdown -->
    <div class="relative" (click)="$event.stopPropagation()">
      <button (click)="toggleProfile($event)"
              class="w-9 h-9 rounded-full overflow-hidden bg-[#183764] flex items-center justify-center text-white text-sm font-bold cursor-pointer hover:opacity-85 transition-opacity border-2 border-transparent hover:border-[#4BBBA0]"
              [title]="studentFullName()">
        <img *ngIf="studentAvatar()" [src]="studentAvatar()" class="w-full h-full object-cover">
        <span *ngIf="!studentAvatar()">{{ initial }}</span>
      </button>

      <!-- Dropdown -->
      <div *ngIf="profileOpen()"
           class="absolute right-0 mt-2 w-48 bg-white dark:bg-[#162033] rounded-2xl shadow-2xl border border-[#DDE1EA] dark:border-slate-800 z-50 overflow-hidden">
        <div class="px-4 py-3 border-b border-[#DDE1EA] dark:border-slate-800">
          <p class="text-sm font-bold text-[#183764] dark:text-white truncate">{{ studentFullName() }}</p>
        </div>
        <a routerLink="/profile" (click)="profileOpen.set(false)"
           class="flex items-center gap-3 px-4 py-3 hover:bg-[#F5F6FA] dark:hover:bg-white/5 transition-colors cursor-pointer">
          <span class="material-symbols-outlined text-[#183764] dark:text-white" style="font-size:18px">person</span>
          <span class="text-sm text-[#183764] dark:text-white">الملف الشخصي</span>
        </a>
        <button (click)="logout()"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-red-50 dark:hover:bg-red-500/10 transition-colors text-red-500">
          <span class="material-symbols-outlined" style="font-size:18px">logout</span>
          <span class="text-sm font-bold">تسجيل الخروج</span>
        </button>
      </div>
    </div>
  </div>
</header>

<!-- ══ PAGE CONTENT ══ -->
<main class="pt-20 pb-12 px-4 md:px-8 min-h-screen bg-[#F5F6FA] dark:bg-[#0F172A]">
  <div class="max-w-[1200px] mx-auto">
    <router-outlet />
  </div>
</main>
